apiVersion: v1
kind: Service
metadata:
  name: windows-prom-test
  labels:
    app: windows-prom-test
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: windows-prom-test
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

