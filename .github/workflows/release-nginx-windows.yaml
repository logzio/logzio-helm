name: Release nginx windows reverse proxy images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 0.0.1)'
        required: true
        type: string

jobs:
  release-windows-2019:
    name: Build and push Windows 2019 image
    runs-on: windows-2019
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        working-directory: charts/logzio-telemetry/nginx
        run: |
          docker build -t logzio/logzio-windows-node-reverse-proxy:${{ inputs.version }}-ltsc2019 --platform windows/amd64 -f Dockerfile .
          docker push logzio/logzio-windows-node-reverse-proxy:${{ inputs.version }}-ltsc2019

  release-windows-2022:
    name: Build and push Windows 2022 image
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        working-directory: charts/logzio-telemetry/nginx
        run: |
          docker build -t logzio/logzio-windows-node-reverse-proxy:${{ inputs.version }}-ltsc2022 --platform windows/amd64 -f Dockerfile.2022 .
          docker push logzio/logzio-windows-node-reverse-proxy:${{ inputs.version }}-ltsc2022

